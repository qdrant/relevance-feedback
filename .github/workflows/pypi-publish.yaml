name: PyPI Publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  UV_PUBLISH_TOKEN: '${{ secrets.PYPI_TOKEN }}'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Python 3.10
        run: uv python install 3.10
      - name: Build
        run: uv build
      - name: Publish
        run: uv publish
